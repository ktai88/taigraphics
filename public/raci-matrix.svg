  <rect x="456" y="168" width="152" height="44" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <text x="228" y="195" fill="#ff9933" font-family="DM Sans, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">A</text>
  <text x="380" y="195" fill="#555555" font-family="DM Sans, system-ui, sans-serif" font-size="14" text-anchor="middle">C</text>
  <text x="532" y="195" fill="#0000ff" font-family="DM Sans, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">R</text>
  <text x="320" y="252" fill="#777777" font-family="DM Sans, system-ui, sans-serif" font-size="10" text-anchor="middle">R = Responsible &#183; A = Accountable &#183; C = Consulted &#183; I = Informed</text>
