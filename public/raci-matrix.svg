  <text x="532" y="151" fill="#555555" font-family="DM Sans, system-ui, sans-serif" font-size="14" text-anchor="middle">C</text>
  <rect x="32" y="168" width="120" height="44" fill="#f8f9fc" stroke="#e8e8e8" stroke-width="1"/>
