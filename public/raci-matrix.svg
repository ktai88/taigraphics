  <text x="532" y="67" fill="#ffffff" font-family="DM Sans, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Ontwikkeling</text>
  <rect x="32" y="80" width="120" height="44" fill="#f8f9fc" stroke="#e8e8e8" stroke-width="1"/>
