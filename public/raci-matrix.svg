<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 268" width="640" height="268" role="img" aria-labelledby="raci-title">
  <title id="raci-title">Voorbeeld RACI-matrix: activiteiten en rollen met R, A, C of I per cel</title>
  <defs>
    <linearGradient id="raci-hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0000ff"/>
      <stop offset="100%" stop-color="#6600cc"/>
    </linearGradient>
  </defs>
  <rect width="640" height="268" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="320" y="28" fill="#333333" font-family="DM Sans, system-ui, sans-serif" font-size="15" font-weight="600" text-anchor="middle">RACI-matrix (voorbeeld)</text>
  <rect x="32" y="44" width="120" height="36" rx="4" fill="#f0f2f8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="92" y="66" fill="#555555" font-family="DM Sans, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Activiteit</text>
  <rect x="152" y="44" width="152" height="36" rx="4" fill="url(#raci-hdr)"/>
  <rect x="304" y="44" width="152" height="36" rx="4" fill="url(#raci-hdr)"/>
  <rect x="456" y="44" width="152" height="36" rx="4" fill="url(#raci-hdr)"/>
  <text x="228" y="67" fill="#ffffff" font-family="DM Sans, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">PM</text>
