  <rect x="152" y="80" width="152" height="44" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <rect x="304" y="80" width="152" height="44" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <rect x="456" y="80" width="152" height="44" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <text x="228" y="107" fill="#ff9933" font-family="DM Sans, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">A</text>
  <text x="380" y="107" fill="#0000ff" font-family="DM Sans, system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">R</text>
  <text x="532" y="107" fill="#555555" font-family="DM Sans, system-ui, sans-serif" font-size="14" text-anchor="middle">I</text>
